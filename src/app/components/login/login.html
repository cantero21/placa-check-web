<div class="min-h-screen bg-gray-50 flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b border-gray-200 px-4 py-3">
    <div class="max-w-lg mx-auto flex items-center gap-3">
      <a routerLink="/" class="text-gray-500 hover:text-gray-700">
        <lucide-icon [img]="ArrowLeft" [size]="20"></lucide-icon>
      </a>
      <h1 class="text-lg font-bold text-gray-800">Iniciar sesión</h1>
    </div>
  </header>

  <!-- Form -->
  <main class="flex-1 flex items-center justify-center px-4">
    <div class="w-full max-w-sm">

      <div class="text-center mb-8">
        <lucide-icon [img]="LogIn" [size]="40" class="text-blue-600 mx-auto mb-3"></lucide-icon>
        <h2 class="text-xl font-bold text-gray-800">Acceso administrador</h2>
      </div>

      <!-- Error -->
      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">
          {{ error() }}
        </div>
      }

      <div class="space-y-4">
        <input
          [(ngModel)]="username"
          placeholder="Usuario"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl text-base
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white"
        />

        <div class="relative">
          <input
            [(ngModel)]="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="Contraseña"
            (keyup.enter)="onLogin()"
            class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-xl text-base
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white"
          />
          <button
            (click)="showPassword.set(!showPassword())"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <lucide-icon [img]="showPassword() ? EyeOff : Eye" [size]="20"></lucide-icon>
          </button>
        </div>

        <button
          (click)="onLogin()"
          [disabled]="loading()"
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold
                 hover:bg-blue-700 active:bg-blue-800 transition-colors shadow-sm
                 disabled:bg-blue-300 disabled:cursor-not-allowed">
          @if (loading()) {
            Ingresando...
          } @else {
            Ingresar
          }
        </button>
      </div>
    </div>
  </main>
</div>
